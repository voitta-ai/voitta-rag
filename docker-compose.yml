services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${VOITTA_DATA_DIR}/qdrant:/qdrant/storage

  voitta-rag:
    build: .
    ports:
      - "${DOCKER_PORT:-58000}:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - VOITTA_ROOT_PATH=/data/fs
      - VOITTA_DB_PATH=/data/voitta.db
      - VOITTA_USERS_FILE=/data/users.txt
      - HF_HOME=/root/.cache/huggingface
      - MINERU_MODELS_DIR=/root/.cache/mineru-models
    volumes:
      - ${VOITTA_DATA_DIR}:/data
      - ${SSH_KEY_DIR:-~/.ssh}:/root/.ssh:ro
      - ${MODEL_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${MODEL_CACHE_DIR:-~/.cache/huggingface}/mineru-models:/root/.cache/mineru-models
    depends_on:
      - qdrant
