services:
  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${VOITTA_ROOT_PATH}/qdrant:/qdrant/storage

  voitta-rag:
    build: .
    restart: unless-stopped
    ports:
      - "${DOCKER_PORT:-58000}:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - VOITTA_ROOT_PATH=/data/fs
      - VOITTA_DOCKER=true
      - VOITTA_DB_PATH=/data/voitta.db
      - VOITTA_USERS_FILE=/data/users.txt
      - HF_HOME=/root/.cache/huggingface
      - GIT_SSH_COMMAND=ssh -o IgnoreUnknown=UseKeychain -o StrictHostKeyChecking=no
    volumes:
      - ${VOITTA_ROOT_PATH}:/data
      - ${SSH_KEY_DIR:-~/.ssh}:/root/.ssh:ro
      - ${MODEL_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    depends_on:
      - qdrant
