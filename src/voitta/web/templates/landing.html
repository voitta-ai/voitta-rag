{% extends "base.html" %}

{% block title %}Welcome - voitta-rag{% endblock %}

{% block content %}
<div class="landing-container">
    <div class="landing-card">
        <h1>Welcome to voitta</h1>

        {% if ms_auth_enabled %}
        <p class="landing-subtitle">Sign in to continue</p>
        <a href="/auth/microsoft" class="ms-login-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 21 21">
                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
            </svg>
            Sign in with Microsoft
        </a>
        {% else %}
        <p class="landing-subtitle">Select your profile to continue</p>
        <div class="user-grid">
            {% for user in users %}
            <form action="/select-user/{{ user.id }}" method="post" class="user-form">
                <button type="submit" class="user-card">
                    <div class="user-avatar">
                        {{ user.name[0] }}
                    </div>
                    <span class="user-name">{{ user.name }}</span>
                </button>
            </form>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
